<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f8c8dc">
  <title>Drill</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app-shell">

    <!-- TOP BAR -->
    <section class="top-bar">
      <button id="resetButton" class="icon-button" type="button">
        <i class="bi bi-shuffle"></i>
      </button>

      <div class="level-picker" id="levelPicker">
        <button data-level-index="0">A</button>
        <button data-level-index="1">B</button>
        <button data-level-index="2">C</button>
        <button data-level-index="3">D</button>
        <button data-level-index="4">E</button>
        <button data-level-index="5">F</button>
      </div>

      <div id="progressText" class="progress-text">0/0</div>
    </section>

    <!-- PROMPT -->
    <section class="prompt-card">
      <div class="chip-row" id="chipRow"></div>
      <h2 id="englishPrompt">Loading...</h2>
    </section>

    <!-- ANSWER -->
    <section id="answerCard" class="answer-card hidden">
      <p id="japaneseAnswer" class="japanese-text"></p>
      <p id="noteText" class="note-text"></p>

      <button id="nextButton" class="primary-button" type="button">
        Next
      </button>
    </section>

    <button id="revealButton" class="reveal-button" type="button">
      Reveal
    </button>

  </main>

  <script src="script.js"></script>
</body>
</html>
